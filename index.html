<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>ZEDEX IDE</title>

<style>

body{
margin:0;
font-family:Inter,system-ui;
background:#0a1026;
color:#dfe7ff;
overflow:hidden;
}

.topbar{
height:48px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
background:#0e1738;
border-bottom:1px solid #1c2b6b;
}

.logo{
font-weight:700;
letter-spacing:2px;
color:#6ea8ff;
}

.workspace{
display:grid;
grid-template-columns:220px 1fr 300px;
height:65vh;
}

.sidebar{
background:#0d1535;
border-right:1px solid #1c2b6b;
overflow:auto;
}

.file{
padding:8px 12px;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,0.04);
}

.file:hover{
background:#1b2a66;
}

.editorArea{
position:relative;
}

#editor{
height:100%;
}

.aiPanel{
background:#0d1535;
border-left:1px solid #1c2b6b;
padding:10px;
display:flex;
flex-direction:column;
}

textarea{
width:100%;
height:120px;
background:#0b1330;
border:1px solid #243a8f;
color:#fff;
}

button{
background:#2c4cff;
border:none;
padding:8px 10px;
margin-top:8px;
color:white;
cursor:pointer;
}

.previewPanel{
height:35vh;
border-top:1px solid #1c2b6b;
}

iframe{
width:100%;
height:100%;
border:none;
background:white;
}

footer{
position:absolute;
bottom:6px;
right:10px;
font-size:12px;
opacity:.7;
}

</style>

</head>
<body>

<div class="topbar">

<div class="logo">ZEDEX IDE</div>

<div>
<button onclick="newFile()">Novo</button>
<button onclick="saveFile()">Salvar</button>
<button onclick="runPreview()">Preview</button>
</div>

</div>


<div class="workspace">

<div class="sidebar" id="files"></div>

<div class="editorArea">
<div id="editor"></div>
</div>

<div class="aiPanel">

<h3>AI Assistant</h3>

<select id="model">
<option>openai</option>
<option>mistral</option>
<option>llama</option>
</select>

<textarea id="prompt"></textarea>

<button onclick="askAI()">Pedir IA</button>

<pre id="aiResponse"></pre>

</div>

</div>

<div class="previewPanel">
<iframe id="preview"></iframe>
</div>

<footer>
Built with <a href="https://pollinations.ai" target="_blank">pollinations.ai</a>
</footer>


<script src="https://unpkg.com/monaco-editor@0.47.0/min/vs/loader.js"></script>

<script>

/* filesystem */

let fs = JSON.parse(localStorage.getItem("zedexFS")||"null") || {

"index.html":`<!DOCTYPE html>
<html>
<head>
<title>ZEDEX</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Hello ZEDEX</h1>

<script src="app.js"><\/script>
</body>
</html>`,

"style.css":`body{
font-family:Arial;
background:#fafafa;
text-align:center;
}`,

"app.js":`console.log("ZEDEX running")`

}

let current="index.html"

function persist(){
localStorage.setItem("zedexFS",JSON.stringify(fs))
}

function renderFiles(){

let root=document.getElementById("files")
root.innerHTML=""

Object.keys(fs).forEach(name=>{

let el=document.createElement("div")
el.className="file"
el.innerText=name

el.onclick=()=>{
openFile(name)
}

root.appendChild(el)

})

}

function newFile(){

let name=prompt("Nome do arquivo")

if(!name) return

fs[name]=""
persist()

renderFiles()

}

function openFile(name){

current=name

editor.setValue(fs[name])

}

function saveFile(){

fs[current]=editor.getValue()

persist()

renderFiles()

}

/* MONACO */

let editor

require.config({
paths:{
vs:"https://unpkg.com/monaco-editor@0.47.0/min/vs"
}
})

require(["vs/editor/editor.main"],function(){

editor=monaco.editor.create(
document.getElementById("editor"),
{
value:fs[current],
language:"javascript",
theme:"vs-dark",
automaticLayout:true
}
)

renderFiles()

})


/* preview engine */

function runPreview(){

saveFile()

let html=fs["index.html"] || ""

const cssBlob=new Blob(
[fs["style.css"]||""],
{type:"text/css"}
)

const jsBlob=new Blob(
[fs["app.js"]||""],
{type:"text/javascript"}
)

const cssURL=URL.createObjectURL(cssBlob)
const jsURL=URL.createObjectURL(jsBlob)

html=html.replace(
"</head>",
`<link rel="stylesheet" href="${cssURL}"></head>`
)

html=html.replace(
"</body>",
`<script src="${jsURL}"><\/script></body>`
)

document.getElementById("preview").srcdoc=html

}


/* POLLINATIONS AI */

async function askAI(){

const prompt=document.getElementById("prompt").value
const model=document.getElementById("model").value

const r=await fetch(
"https://text.pollinations.ai/openai",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

model:model,

messages:[
{
role:"user",
content:prompt
}
]

})
})

const txt=await r.text()

document.getElementById("aiResponse").innerText=txt

}

</script>

</body>
</html>
