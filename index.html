<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ZEDEX IDE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/monaco-editor@0.47.0/min/vs/loader.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#02030a;
color:white;
font-family:Orbitron;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;

}

/* TOPBAR */

#topbar{

height:50px;
background:linear-gradient(90deg,#05071a,#111546);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #1c1f4f;

}

#logo{

color:#00f7ff;
font-weight:bold;
letter-spacing:2px;

}

/* LAYOUT */

#layout{

flex:1;
display:grid;
grid-template-columns:260px 1fr 380px;

}

/* EXPLORER */

#explorer{

background:#04061a;
border-right:1px solid #121542;
padding:10px;
overflow:auto;

}

.file{

padding:6px;
cursor:pointer;
border-radius:4px;

}

.file:hover{

background:#11143c;

}

/* CENTER */

#center{

display:flex;
flex-direction:column;

}

#tabs{

height:36px;
background:#060a25;
display:flex;
align-items:center;

}

.tab{

padding:6px 14px;
cursor:pointer;

}

.tab.active{

background:#161a54;

}

#editor{

flex:1;

}

#monaco{

height:100%;

}

/* TERMINAL */

#terminal{

height:120px;
background:black;
font-family:monospace;
color:#00ff90;
padding:10px;
overflow:auto;

}

/* AI PANEL */

#ai{

background:#05071d;
border-left:1px solid #111;
display:flex;
flex-direction:column;

}

#ai-header{

padding:10px;
border-bottom:1px solid #111;
color:#ff2cdf;

}

#ai-chat{

flex:1;
overflow:auto;
padding:10px;

}

.msg{

margin-bottom:10px;

}

.user{

color:#00eaff;

}

.ai{

color:#7aff7a;

}

#ai-input{

display:flex;
border-top:1px solid #111;

}

#prompt{

flex:1;
background:black;
border:none;
color:white;
padding:10px;

}

button{

background:#ff2cdf;
border:none;
color:white;
padding:10px 14px;
cursor:pointer;

}

</style>

</head>

<body>

<div id="topbar">

<div id="logo">
ZEDEX IDE
</div>

<div>
<a href="https://pollinations.ai" target="_blank">
Built with pollinations.ai
</a>
</div>

</div>

<div id="layout">

<div id="explorer">

<h3>EXPLORER</h3>

<div id="files"></div>

<button onclick="newFile()">+ Novo</button>

</div>

<div id="center">

<div id="tabs"></div>

<div id="editor">

<div id="monaco"></div>

</div>

<div id="terminal"></div>

</div>

<div id="ai">

<div id="ai-header">

ZEDEX AI

</div>

<div id="ai-chat"></div>

<div id="ai-input">

<textarea id="prompt"></textarea>

<button onclick="askAI()">Enviar</button>

</div>

</div>

</div>

<script>

/* FILE SYSTEM */

let files={

"index.html":"<h1>Hello ZEDEX</h1>",
"app.js":"console.log('zedex');"

}

let currentFile="index.html"

/* EXPLORER */

function refreshExplorer(){

const list=document.getElementById("files")

list.innerHTML=""

for(let f in files){

let el=document.createElement("div")

el.className="file"

el.innerText=f

el.onclick=()=>openFile(f)

list.appendChild(el)

}

}

function newFile(){

let name=prompt("Nome do arquivo")

files[name]=""

refreshExplorer()

}

/* TABS */

function addTab(name){

let tabs=document.getElementById("tabs")

let tab=document.createElement("div")

tab.className="tab"

tab.innerText=name

tabs.appendChild(tab)

}

/* TERMINAL */

function term(msg){

let t=document.getElementById("terminal")

t.innerHTML+=`<div>> ${msg}</div>`

}

/* MONACO */

let editor

require.config({paths:{vs:"https://unpkg.com/monaco-editor@0.47.0/min/vs"}})

require(["vs/editor/editor.main"],function(){

editor=monaco.editor.create(

document.getElementById("monaco"),

{

value:files[currentFile],

language:"html",

theme:"vs-dark",

automaticLayout:true

}

)

})

function openFile(name){

currentFile=name

editor.setValue(files[name])

addTab(name)

}

/* AI CHAT */

function addMessage(text,type){

let chat=document.getElementById("ai-chat")

let d=document.createElement("div")

d.className="msg "+type

d.innerText=text

chat.appendChild(d)

}

/* POLLINATIONS AI */

async function askAI(){

let prompt=document.getElementById("prompt").value

addMessage(prompt,"user")

document.getElementById("prompt").value=""

let code=editor.getValue()

let r=await fetch(

"https://gen.pollinations.ai/v1/chat/completions",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

model:"openai",

messages:[

{

role:"system",

content:"You are ZEDEX IDE AI assistant. You help create files and code."

},

{

role:"user",

content:prompt+"\n\nCurrent code:\n"+code

}

]

})

}

)

let data=await r.json()

let text=data.choices[0].message.content

addMessage(text,"ai")

}

refreshExplorer()

term("ZEDEX IDE iniciado")

</script>

</body>
</html>TRRRRRRRRR
